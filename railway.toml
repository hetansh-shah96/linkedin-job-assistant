[build]
builder = "NIXPACKS"
buildCommand = "npm install && cp node_modules/pdfjs-dist/build/pdf.worker.min.js public/pdf.worker.min.js && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "linkedin-job-assistant"
